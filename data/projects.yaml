projects:
  - id: bkash-eid-festival
    title: "Bkash Eid Festival"
    subtitle: "CGI Advertisement Campaign"
    type: "CGI / Advertisement"
    year: 2025
    role: "CG Set Planning & Modeling, Rotoscoping Lead, Lighting & Rendering"
    client: "Bkash"
    location: "Dhaka, Bangladesh"
    status: "Completed"
    link: "https://youtu.be/coybV16neaM"
    short_description: "National Eid festival advertisement for Bkash — Bangladesh's leading mobile financial service. A large-scale CGI production blending digital environments with live-action footage."
    long_description: |
      Led the complete CG set design and modeling pipeline for Bkash's high-profile Eid Festival campaign. 
      The project required building photorealistic digital environments from scratch, integrating seamlessly with live-action footage through advanced rotoscoping and chroma-key compositing.

      As Rotoscoping Lead, I oversaw the extraction and integration of talent from green screen environments into the fully digital world, ensuring pixel-perfect edges and motion-consistent compositing throughout.

      Lighting and rendering were executed using Blender Cycles with custom HDRI environments and physically-based materials to achieve the warm, celebratory aesthetic of Eid.
    tags: ["CGI", "Advertisement", "Compositing", "Blender", "VFX"]
    cover_video: "https://youtu.be/coybV16neaM"
    cover_color: "#C8A96E"

  - id: funtastic-energy-biscuit
