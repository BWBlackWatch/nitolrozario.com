    link: "https://youtu.be/w9cVQAr7cxY"
    short_description: "A dynamic product launch cinematic combining photorealistic 3D environments with live-action performance — shot with full chroma-key production."
    long_description: |
      Designed and built the complete 3D environment for this product launch campaign, creating an immersive world that surrounds and elevates the Funtastic brand narrative.

      The production pipeline involved close collaboration with the live-action film crew to ensure the digital environments matched the camera angles, lighting conditions, and color grading of the on-set footage.

      Chroma-key extraction and rotoscoping were critical to blending talent naturally into the digital world. Final compositing was done in DaVinci Resolve with careful attention to grain matching and color science.
    tags: ["CGI", "Product Animation", "Environment Design", "Compositing"]
    cover_video: "https://youtu.be/w9cVQAr7cxY"
    cover_color: "#E8C547"

