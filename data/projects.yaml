    subtitle: "CG Visualization & Advertisement"
    type: "CGI / Architectural Visualization"
    year: 2025
    role: "Look Development, Architectural Consultancy, 3D Modeling, Environment Modeling, Rendering"
    client: "Saladology"
    location: "Dhaka, Bangladesh"
    status: "Completed"
    short_description: "Debut event visualization for Saladology — combining architectural consultancy with photorealistic 3D environment design to present the brand's vision before launch."
    long_description: |
      Served as Architectural Consultant and Lead 3D Artist for Saladology's debut event campaign. The brief required creating an aspirational visual world that would introduce the brand to the market with maximum impact.

      Look development involved extensive material research and reference gathering to establish the fresh, premium aesthetic that defined the Saladology brand language. Environments were designed to feel inviting, modern, and health-forward.

      The production combined architectural spatial planning with product visualization — creating cohesive environments where the brand's identity could authentically live. Final renders were delivered for use across event spaces and digital media.
    tags: ["CGI", "Architectural Visualization", "Brand", "Environment Design"]
    cover_color: "#4A8C5C"
