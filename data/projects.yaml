    subtitle: "Product Launch CGI Animation"
    type: "CGI / Branding Animation"
    year: 2025
    role: "Animation Lead, Organic Product Modeling, Keyframe Animation, Compositing & Video Editing"
    client: "Shahjalal Snacks"
    location: "Dhaka, Bangladesh"
    status: "Completed"
    link: "https://youtu.be/R_NjxhITZdw"
    short_description: "Led the full animation and conceptualization of this brand relaunch — featuring organic food product modeling and dynamic keyframe animation for a signature campaign."
    long_description: |
      Conceptualized and led the complete animation strategy for Shahjalal Snacks' brand relaunch. The brief required creating an appetizing, organic aesthetic that communicated product freshness and quality.

      Built detailed organic food product models using Blender's sculpting and geometry nodes tools, ensuring textures and materials conveyed authentic tactile qualities under multiple lighting conditions.

      Designed and executed complex keyframe animation sequences for product reveals, flavor demonstrations, and brand identity moments. Final output was composited with motion typography and delivered as broadcast-ready video content.
    tags: ["CGI", "Branding", "Food Visualization", "Animation", "Compositing"]
    cover_video: "https://youtu.be/R_NjxhITZdw"
    cover_color: "#D4522A"

  - id: crimson-strata
    title: "Crimson Strata"
    subtitle: "Mixed-Use Urban Habitat — Architectural Concept"
    type: "Architecture / Animation"
    year: 2024
    role: "Project Architect & Designer, Animation Lead, BIM Modeling, 3D Animation, Compositing & Video Editing"
    client: "Academic / Personal"
    location: "Bangladesh"
    status: "Completed"
    link: "https://youtu.be/9aYZlVenmEo"
    short_description: "A conceptual mixed-use urban habitat exploring stratified living — layering residential, commercial, and green space across a vertical urban form."
    long_description: |
      Crimson Strata is an architectural conceptual project exploring the theme of vertical urbanism and layered living typologies. As Project Architect and Animation Lead, I was responsible for the complete design workflow from conceptualization through visualization.

      The design proposes a mixed-use habitat where residential zones, commercial corridors, and landscape terraces interweave across multiple strata, creating a self-sustaining urban micro-community.

      BIM modeling in Revit established the technical documentation while Blender handled the cinematic animation, capturing the building's spatial qualities through carefully choreographed camera sequences. The final architectural film was composited and edited for competition submission.
    tags: ["Architecture", "BIM", "Animation", "Urban Design", "Conceptual"]
    cover_video: "https://youtu.be/9aYZlVenmEo"
    cover_color: "#8B2020"

  - id: center-animation-game-dev
    title: "Center for Animation, Game Dev & eSport"
    subtitle: "Architectural Conceptual Animation"
    type: "Architecture / Animation"
    year: 2023
    role: "Project Architect & Designer, Animation Lead, BIM Modeling, 3D Animation, Compositing & Video Editing"
    client: "Academic / Competition"
    location: "Bangladesh"
    status: "Completed"
    link: "https://youtu.be/45pP7vBZ1aI"
    short_description: "An architectural concept for a dedicated center serving the digital creative industries — designed as a hub for animation studios, game developers, and eSport facilities."
    long_description: |
      Designed and animated a comprehensive architectural proposal for a Center dedicated to the digital creative economy — bringing together animation production, game development, and competitive eSport under one architectural identity.

      The design language reflects the digital nature of its occupants: dynamic, layered, and expressive. Spatial arrangements prioritize collaboration and cross-pollination between disciplines while maintaining technical requirements for each facility type.

      As both Project Architect and Animation Director, I built the full BIM model and then translated it into a cinematic architectural film using Blender, Lumion, and After Effects. The animation follows the human experience through the building, revealing its programmatic logic through movement.
    tags: ["Architecture", "BIM", "Animation", "Cultural", "Conceptual"]
    cover_video: "https://youtu.be/45pP7vBZ1aI"
    cover_color: "#1A3A5C"

