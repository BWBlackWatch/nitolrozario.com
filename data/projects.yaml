  - id: ride-secure-evie
    title: "Ride Secure — EVIE S1 & T1"
    subtitle: "Product Launch CGI Animation"
    type: "CGI / Product Animation"
    year: 2024
    role: "Planning, Hardsurface Modeling, Animation, Lighting & Rendering"
    client: "Ride Secure"
    location: "USA"
    status: "Completed"
    link: "https://youtu.be/aRZ61Y6xsH0"
    short_description: "International product launch animation for EVIE electric vehicles — a precision hardsurface modeling and cinematic animation production for the US market."
    long_description: |
      Took complete charge of the production pipeline for this international electric vehicle launch. Starting from technical reference drawings, I built highly accurate hardsurface models of the EVIE S1 and T1 vehicles.

      The animation work required careful planning of camera choreography, vehicle motion dynamics, and environmental integration to create a visually compelling product launch narrative that would resonate with US audiences.

      Lighting was designed to showcase the vehicle's form language and premium finish, using a combination of studio and exterior environments. Final renders were composited with motion graphics and delivered broadcast-ready.
    tags: ["CGI", "Product Animation", "Hardsurface", "Automotive", "USA"]
    cover_video: "https://youtu.be/aRZ61Y6xsH0"
    cover_color: "#2B5EA7"

  - id: shahjalal-snacks-rebranding
